// ═══════════════════════════════════════════════════════════
//  CALCULADORA DE COMBATE
// ═══════════════════════════════════════════════════════════
function Calculator() {
  const [atk, setAtk] = useState(10);
  const [def, setDef] = useState(17);
  const [dmg, setDmg] = useState(3);
  const [reducer, setReducer] = useState('none');
  const [rolls, setRolls] = useState([]);
  const [simCount, setSimCount] = useState(0);

  const REDUCERS = [
    {id:'none',   label:'Ninguno',        val:0},
    {id:'tough',  label:'Resistencia',    val:1},
    {id:'invuln', label:'Invulnerabilidad',val:2},
    {id:'imperv', label:'Impenetrabilidad',val:null}, // special: 50% -> 0, else -2
  ];

  const prob = calcProb(atk, def);
  const probPct = (prob*100).toFixed(1);

  const effDmg = () => {
    const r = REDUCERS.find(r=>r.id===reducer);
    if (reducer==='imperv') return `${(dmg*0.5).toFixed(1)} (promedio)`; // 50% full, 50% max(dmg-2,1)
    const reduced = r ? Math.max(1, dmg - r.val) : dmg;
    return `${reduced} daño`;
  };

  const expectedDmg = () => {
    const r = REDUCERS.find(r=>r.id===reducer);
    let d;
    if (reducer==='imperv') {
      d = (dmg * 0.5) + (Math.max(1, dmg-2) * 0.5); // avg over rolls
    } else {
      d = r ? Math.max(1, dmg - r.val) : dmg;
    }
    return (prob * d).toFixed(2);
  };

  const rollDice = () => {
    const d1 = Math.ceil(Math.random()*6);
    const d2 = Math.ceil(Math.random()*6);
    const total = d1+d2;
    const snakeEyes = d1===1&&d2===1;
    const critical = d1===d2 && !snakeEyes;
    const hit = !snakeEyes && (critical || (total+atk >= def));
    const r = REDUCERS.find(r=>r.id===reducer);
    let dmgDealt = 0;
    if (hit) {
      if (reducer==='imperv') {
        const impRoll = Math.ceil(Math.random()*6);
        dmgDealt = impRoll>=5 ? 0 : Math.max(1,dmg-2);
      } else {
        dmgDealt = r ? Math.max(1, dmg-r.val) : dmg;
      }
    }
    const entry = {id:Date.now(),d1,d2,total,hit,critical,snakeEyes,dmgDealt,atkMod:total+atk};
    setRolls(prev=>[entry,...prev.slice(0,14)]);
    setSimCount(c=>c+1);
  };

  const clearRolls = () => { setRolls([]); setSimCount(0); };

  const probColor = p => p>=0.7?'#22C55E': p>=0.4?'#D4A840': '#EF4444';

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden',padding:'14px',gap:'12px'}}>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',flexShrink:0}}>
        {/* Combat inputs */}
        <div className="panel corner" style={{padding:'14px'}}>
          <div className="orbitron" style={{fontSize:'10px',color:'#D4AF50',marginBottom:'12px',letterSpacing:'2px'}}>⚔ CONFIGURAR COMBATE</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {[
              {label:'ATAQUE',  val:atk, set:setAtk, min:1, max:20},
              {label:'DEFENSA', val:def, set:setDef, min:1, max:22},
              {label:'DAÑO',    val:dmg, set:setDmg, min:1, max:10},
            ].map(({label,val,set,min,max})=>(
              <div key={label} style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <div className="orbitron" style={{fontSize:'9px',color:'rgba(225,185,80,0.92)',minWidth:'58px',letterSpacing:'1px'}}>{label}</div>
                <button onClick={()=>set(v=>Math.max(min,v-1))} className="btn-outline" style={{width:26,height:26,padding:0,fontSize:'14px',lineHeight:1}}>−</button>
                <div className="orbitron" style={{fontSize:'18px',fontWeight:900,color:'#EAC858',minWidth:'36px',textAlign:'center'}}>{val}</div>
                <button onClick={()=>set(v=>Math.min(max,v+1))} className="btn-outline" style={{width:26,height:26,padding:0,fontSize:'14px',lineHeight:1}}>+</button>
                <input type="range" min={min} max={max} value={val} onChange={e=>set(parseInt(e.target.value))}
                       style={{flex:1,accentColor:'#D4A840',height:'4px',background:'transparent',cursor:'pointer'}}/>
              </div>
            ))}
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'4px'}}>
              <div className="orbitron" style={{fontSize:'9px',color:'rgba(225,185,80,0.92)',minWidth:'58px',letterSpacing:'1px'}}>REDUCTOR</div>
              <select value={reducer} onChange={e=>setReducer(e.target.value)} style={{flex:1,padding:'4px 8px',fontSize:'10px',borderRadius:'2px'}}>
                {REDUCERS.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
              </select>
            </div>
          </div>
        </div>

        {/* Stats */}
        <div className="panel" style={{padding:'14px',display:'flex',flexDirection:'column',gap:'10px'}}>
          <div className="orbitron" style={{fontSize:'10px',color:'#D4AF50',letterSpacing:'2px'}}>📊 ESTADÍSTICAS</div>

          <div style={{textAlign:'center',padding:'10px 0'}}>
            <div className="orbitron" style={{fontSize:'36px',fontWeight:900,color:probColor(prob),textShadow:`0 0 16px ${probColor(prob)}88`}}>{probPct}%</div>
            <div style={{fontSize:'10px',color:'rgba(225,185,80,0.92)',marginTop:'2px'}}>PROBABILIDAD DE IMPACTO</div>
          </div>

          <div className="prob-bar-wrap">
            <div className="prob-bar" style={{width:`${probPct}%`,background:`linear-gradient(90deg,${probColor(prob)}88,${probColor(prob)})`}}/>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginTop:'4px'}}>
            {[
              {l:'Necesitas',   v:`${Math.max(2,def-atk)} en 2d6`},
              {l:'Daño efectivo',v:effDmg()},
              {l:'Daño esperado',v:expectedDmg()},
              {l:'Fallos',       v:`${(100-parseFloat(probPct)).toFixed(1)}%`},
            ].map(({l,v})=>(
              <div key={l} style={{background:'rgba(225,185,80,0.13)',border:'1px solid rgba(225,185,80,0.28)',padding:'7px 8px',borderRadius:'2px'}}>
                <div style={{fontSize:'8px',color:'rgba(225,185,80,0.84)',letterSpacing:'1px'}}>{l}</div>
                <div style={{fontSize:'11px',color:'#EAC858',fontWeight:'bold',marginTop:'2px'}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Distribución 2d6 */}
          <div style={{marginTop:'4px'}}>
            <div style={{fontSize:'8px',color:'rgba(225,185,80,0.84)',letterSpacing:'1px',marginBottom:'5px'}}>DISTRIBUCIÓN 2d6 (necesitas ≥{Math.max(2,def-atk)})</div>
            <div style={{display:'flex',gap:'2px',alignItems:'flex-end',height:'36px'}}>
              {OUTCOMES.map(o=>{
                const cnt=DIST[o]||0; const pct=cnt/36; const needed=Math.max(2,def-atk);
                const hits=(o>=needed)||(o===2&&def-atk<=2);
                const isSnakeEyes=o===2;
                const barH=Math.round(pct*36);
                return (
                  <div key={o} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'1px'}}>
                    <div style={{width:'100%',height:`${barH}px`,background:isSnakeEyes?'#374151':hits?'#16A34A':'rgba(225,185,80,0.58)',borderRadius:'1px 1px 0 0',minHeight:'2px',transition:'height 0.3s'}}/>
                    <div style={{fontSize:'7px',color:'rgba(225,185,80,0.84)'}}>{o}</div>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:'10px',marginTop:'4px',fontSize:'8px'}}>
              <span style={{color:'#16A34A'}}>■ Impacto</span>
              <span style={{color:'rgba(225,185,80,0.78)'}}>■ Fallo</span>
              <span style={{color:'#374151'}}>■ Snake Eyes</span>
            </div>
          </div>
        </div>
      </div>

      {/* Dice roller */}
      <div style={{display:'flex',gap:'12px',flex:1,overflow:'hidden',minHeight:0}}>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:'8px',overflow:'hidden'}}>
          <div style={{display:'flex',gap:'8px',alignItems:'center',flexShrink:0}}>
            <div className="orbitron" style={{fontSize:'10px',color:'#D4AF50',letterSpacing:'2px',flex:1}}>🎲 SIMULADOR DE TIRADAS</div>
            <button className="btn-gold" style={{padding:'6px 16px',fontSize:'10px',borderRadius:'2px'}} onClick={rollDice}>TIRAR 2d6</button>
            {rolls.length>0 && <button className="btn-outline" style={{padding:'6px 10px',fontSize:'10px',borderRadius:'2px'}} onClick={clearRolls}>LIMPIAR</button>}
          </div>

          <div style={{flex:1,overflowY:'auto'}}>
            {rolls.length===0 ? (
              <div style={{textAlign:'center',padding:'24px',color:'rgba(225,185,80,0.72)',fontSize:'11px'}}>
                <div style={{fontSize:'28px',marginBottom:'8px'}}>🎲</div>
                Pulsa TIRAR 2d6 para simular ataques
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                {rolls.map((r,i)=>(
                  <div key={r.id} className="fade-in" style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',background:r.snakeEyes?'rgba(239,68,68,0.06)':r.hit?'rgba(22,163,74,0.06)':'rgba(225,185,80,0.10)',border:`1px solid ${r.snakeEyes?'rgba(239,68,68,0.3)':r.hit?'rgba(22,163,74,0.2)':'rgba(225,185,80,0.28)'}`,borderRadius:'2px'}}>
                    <div style={{display:'flex',gap:'3px'}}>
                      <span className="dice-face" style={{width:24,height:24,fontSize:'13px',borderColor:r.critical?'#D4A840':'rgba(225,185,80,0.72)'}}>{r.d1}</span>
                      <span className="dice-face" style={{width:24,height:24,fontSize:'13px',borderColor:r.critical?'#D4A840':'rgba(225,185,80,0.72)'}}>{r.d2}</span>
                    </div>
                    <div className="orbitron" style={{fontSize:'13px',fontWeight:900,color:'#D4AF50',minWidth:'24px'}}>{r.total}</div>
                    <div style={{fontSize:'10px',color:'rgba(225,185,80,0.92)'}}>+{atk} = <strong style={{color:'#EAC858'}}>{r.atkMod}</strong> vs {def}</div>
                    <div style={{flex:1,fontSize:'10px',fontWeight:'bold',color:r.snakeEyes?'#EF4444':r.hit?'#22C55E':'rgba(225,185,80,0.92)'}}>
                      {r.snakeEyes?'✕ SNAKE EYES':r.critical?`★ CRÍTICO ${r.hit?'':' (falla)'}`:r.hit?'✓ IMPACTO':'✕ FALLO'}
                    </div>
                    {r.hit && <div className="orbitron" style={{fontSize:'12px',fontWeight:900,color:'#EF4444',flexShrink:0}}>{r.dmgDealt > 0 ? `-${r.dmgDealt}♥`:'-0♥'}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  REGLAMENTO SECTION
// ═══════════════════════════════════════════════════════════
function ReglamentoSection() {
  const [active, setActive] = useState('basics');
  const [search, setSearch] = useState('');
  const sec = REGLAMENTO.find(s=>s.id===active);

  const filteredItems = sec ? (search.trim() ?
    sec.items.filter(it=>it.t.toLowerCase().includes(search.toLowerCase())||it.d.toLowerCase().includes(search.toLowerCase()))
    : sec.items) : [];

  return (
    <div style={{display:'flex',height:'100%',overflow:'hidden'}}>
      {/* Sub-nav */}
      <div style={{width:'155px',flexShrink:0,overflowY:'auto',background:'#0F0F18',borderRight:'1px solid rgba(225,185,80,0.38)',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'8px',borderBottom:'1px solid rgba(225,185,80,0.18)'}}>
          <div className="orbitron" style={{fontSize:'8px',color:'rgba(225,185,80,0.84)',letterSpacing:'2px',textAlign:'center'}}>SECCIONES</div>
        </div>
        {REGLAMENTO.map(s=>(
          <div key={s.id} onClick={()=>{setActive(s.id);setSearch('');}}
               style={{padding:'11px 12px',cursor:'pointer',fontSize:'9px',lineHeight:'1.4',borderLeft:`3px solid ${active===s.id?'#D4A840':'transparent'}`,background:active===s.id?'rgba(225,185,80,0.18)':'transparent',color:active===s.id?'#EAC858':'rgba(225,185,80,0.92)',letterSpacing:'1px',transition:'all 0.2s',borderBottom:'1px solid rgba(225,185,80,0.16)'}}>
            {s.title}
          </div>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {/* Search */}
        <div style={{padding:'10px 14px',borderBottom:'1px solid rgba(225,185,80,0.28)',background:'#141420',flexShrink:0}}>
          <input style={{width:'100%',padding:'6px 10px',fontSize:'11px',borderRadius:'2px'}} placeholder="Buscar en esta sección..."
                 value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'14px'}}>
          {sec && (
            <div className="fade-in">
              <div className="orbitron" style={{fontSize:'12px',fontWeight:900,color:'#EAC858',paddingBottom:'10px',borderBottom:'1px solid rgba(225,185,80,0.58)',marginBottom:'12px'}}>{sec.title}</div>
              {filteredItems.length===0 ? (
                <div style={{textAlign:'center',padding:'24px',color:'rgba(225,185,80,0.72)',fontSize:'11px'}}>Sin resultados para "{search}"</div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {filteredItems.map(it=>(
                    <div key={it.t} style={{background:'#1C1C28',border:'1px solid rgba(225,185,80,0.38)',padding:'12px'}}>
                      <div style={{color:'#D4A840',fontSize:'12px',fontWeight:'bold',marginBottom:'5px'}}>{it.t}</div>
                      <div style={{color:'#E8C868',fontSize:'11px',lineHeight:'1.7'}}>{it.d}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  EVENTOS — storage helpers
// ═══════════════════════════════════════════════════════════
const EVENTS_KEY = 'heroclix_events_v1';
const loadEvents = () => { try { return JSON.parse(localStorage.getItem(EVENTS_KEY)) || []; } catch { return []; } };
const saveEvents = (ev) => { try { localStorage.setItem(EVENTS_KEY, JSON.stringify(ev)); } catch {} };

const EVENT_TYPES = [
  { id:'torneo',       label:'Torneo',       icon:'🏆', color:'#CA8A04' },
  { id:'presentacion', label:'Presentación', icon:'📋', color:'#0EA5E9' },
  { id:'pachanga',     label:'Pachanga',     icon:'🎮', color:'#16A34A' },
  { id:'liga',         label:'Liga',         icon:'🥇', color:'#7C3AED' },
  { id:'amistoso',     label:'Amistoso',     icon:'🤝', color:'#D4A840' },
];

const EVENT_FORMATS = ['Modern Age','Golden Age','Pulp','Sealed','Casual'];

const RESULT_OPTIONS = [
  { id:'',          label:'Sin registrar' },
  { id:'1',         label:'🥇 1.º puesto' },
  { id:'2',         label:'🥈 2.º puesto' },
  { id:'3',         label:'🥉 3.º puesto' },
  { id:'top8',      label:'Top 8' },
  { id:'top16',     label:'Top 16' },
  { id:'participe', label:'Participé' },
  { id:'baja',      label:'Baja / No asistí' },
];

function EventosSection() {
  const [events,    setEvents]    = useState(loadEvents);
  const [selId,     setSelId]     = useState(null);
  const [modal,     setModal]     = useState(null); // 'new' | 'edit' | 'confirmDelete'
  const [filterType,setFilterType]= useState('ALL');
  const [search,    setSearch]    = useState('');

  // form state compartido para crear/editar
  const EMPTY_FORM = { name:'', date:'', location:'', type:'torneo', format:'Modern Age', result:'', teamUsed:'', notes:'' };
  const [form, setForm] = useState(EMPTY_FORM);
  const [formErr, setFormErr] = useState('');

  useEffect(()=>{ saveEvents(events); }, [events]);

  // evento seleccionado
  const event = events.find(e=>e.id===selId) || null;

  // lista filtrada + ordenada por fecha desc
  const filtered = events
    .filter(e => filterType==='ALL' || e.type===filterType)
    .filter(e => !search.trim() || e.name.toLowerCase().includes(search.toLowerCase()) || (e.location||'').toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  // helpers de apertura de modal
  const openNew = () => {
    setForm({ ...EMPTY_FORM, date: new Date().toISOString().slice(0,10) });
    setFormErr('');
    setModal('new');
  };
  const openEdit = (ev) => {
    setForm({ name:ev.name||'', date:ev.date||'', location:ev.location||'', type:ev.type||'torneo', format:ev.format||'Modern Age', result:ev.result||'', teamUsed:ev.teamUsed||'', notes:ev.notes||'' });
    setFormErr('');
    setModal('edit');
  };
  const closeModal = () => setModal(null);

  const saveEvent = () => {
    if (!form.name.trim()) { setFormErr('El nombre del evento es obligatorio.'); return; }
    if (!form.date)         { setFormErr('La fecha es obligatoria.'); return; }
    if (modal==='new') {
      const ev = { id:Date.now(), ...form, name:form.name.trim(), location:form.location.trim(), teamUsed:form.teamUsed.trim(), notes:form.notes.trim() };
      const u = [...events, ev];
      setEvents(u);
      setSelId(ev.id);
    } else {
      setEvents(events.map(e=>e.id===selId ? { ...e, ...form, name:form.name.trim(), location:form.location.trim(), teamUsed:form.teamUsed.trim(), notes:form.notes.trim() } : e));
    }
    closeModal();
  };

  const deleteEvent = () => {
    const u = events.filter(e=>e.id!==selId);
    setEvents(u);
    setSelId(u.length>0 ? u[0].id : null);
    closeModal();
  };

  const typeInfo = (id) => EVENT_TYPES.find(t=>t.id===id) || EVENT_TYPES[0];
  const resultLabel = (id) => RESULT_OPTIONS.find(r=>r.id===id)?.label || '';

  const fmtDate = (d) => {
    if (!d) return '—';
    try { return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}); }
    catch { return d; }
  };

  // stats rápidas
  const stats = {
    total:   events.length,
    torneos: events.filter(e=>e.type==='torneo').length,
    podios:  events.filter(e=>['1','2','3'].includes(e.result)).length,
  };

  // ── UI ──────────────────────────────────────────────────
  return (
    <div style={{display:'flex',height:'100%',overflow:'hidden',position:'relative'}}>

      {/* ── COLUMNA IZQUIERDA: lista + filtros ── */}
      <div style={{width:'240px',flexShrink:0,display:'flex',flexDirection:'column',borderRight:'1px solid rgba(225,185,80,0.38)',background:'#0F0F18'}}>

        {/* Stats rápidas */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1px',background:'rgba(225,185,80,0.28)',borderBottom:'1px solid rgba(225,185,80,0.38)'}}>
          {[
            {l:'EVENTOS', v:stats.total},
            {l:'TORNEOS', v:stats.torneos},
            {l:'PODIOS',  v:stats.podios},
          ].map(s=>(
            <div key={s.l} style={{background:'#0F0F18',padding:'8px 4px',textAlign:'center'}}>
              <div className="orbitron" style={{fontSize:'16px',fontWeight:900,color:'#D4A840'}}>{s.v}</div>
              <div style={{fontSize:'7px',color:'rgba(225,185,80,0.84)',letterSpacing:'1px',marginTop:'1px'}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Botón nuevo */}
        <div style={{padding:'8px'}}>
          <button className="btn-gold" style={{width:'100%',padding:'8px',fontSize:'10px',borderRadius:'2px'}} onClick={openNew}>
            + NUEVO EVENTO
          </button>
        </div>

        {/* Buscador */}
        <div style={{padding:'0 8px 6px'}}>
          <input style={{width:'100%',padding:'6px 8px',fontSize:'10px',borderRadius:'2px'}}
                 placeholder="Buscar evento o lugar…"
                 value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>

        {/* Filtro por tipo */}
        <div style={{padding:'0 8px 6px',display:'flex',flexWrap:'wrap',gap:'3px'}}>
          <button onClick={()=>setFilterType('ALL')}
                  style={{padding:'3px 7px',fontSize:'8px',cursor:'pointer',fontFamily:"'Share Tech Mono',monospace",borderRadius:'2px',background:filterType==='ALL'?'rgba(225,185,80,0.38)':'transparent',border:`1px solid ${filterType==='ALL'?'#D4A840':'rgba(225,185,80,0.38)'}`,color:filterType==='ALL'?'#EAC858':'rgba(225,185,80,0.88)'}}>
            TODOS
          </button>
          {EVENT_TYPES.map(t=>(
            <button key={t.id} onClick={()=>setFilterType(filterType===t.id?'ALL':t.id)}
                    style={{padding:'3px 7px',fontSize:'8px',cursor:'pointer',fontFamily:"'Share Tech Mono',monospace",borderRadius:'2px',background:filterType===t.id?'rgba(225,185,80,0.38)':'transparent',border:`1px solid ${filterType===t.id?t.color:'rgba(225,185,80,0.38)'}`,color:filterType===t.id?t.color:'rgba(225,185,80,0.88)'}}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>

        {/* Lista de eventos */}
        <div style={{flex:1,overflowY:'auto',borderTop:'1px solid rgba(225,185,80,0.18)'}}>
          {filtered.length===0 ? (
            <div style={{textAlign:'center',padding:'32px 12px',color:'rgba(225,185,80,0.72)',fontSize:'10px'}}>
              {events.length===0 ? 'Sin eventos. Crea el primero.' : 'Sin resultados para el filtro.'}
            </div>
          ) : filtered.map(ev=>{
            const ti = typeInfo(ev.type);
            const isActive = ev.id===selId;
            return (
              <div key={ev.id} onClick={()=>setSelId(ev.id)}
                   style={{padding:'10px 12px',cursor:'pointer',borderLeft:`3px solid ${isActive?ti.color:'transparent'}`,background:isActive?'rgba(225,185,80,0.16)':'transparent',borderBottom:'1px solid rgba(225,185,80,0.14)',transition:'all 0.15s'}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:'7px'}}>
                  <span style={{fontSize:'14px',flexShrink:0,marginTop:'1px'}}>{ti.icon}</span>
                  <div style={{flex:1,overflow:'hidden'}}>
                    <div style={{fontSize:'11px',fontWeight:'bold',color:isActive?'#EAC858':'#D8B458',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.name}</div>
                    <div style={{fontSize:'8px',color:'rgba(225,185,80,0.84)',marginTop:'2px'}}>{fmtDate(ev.date)}</div>
                    {ev.location && <div style={{fontSize:'8px',color:'rgba(225,185,80,0.78)',marginTop:'1px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>📍 {ev.location}</div>}
                    {ev.result && <div style={{fontSize:'8px',color:ti.color,marginTop:'2px'}}>{resultLabel(ev.result)}</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── COLUMNA DERECHA: detalle ── */}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {!event ? (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'14px',color:'rgba(225,185,80,0.72)'}}>
            <div style={{fontSize:'44px'}}>◷</div>
            <div className="orbitron" style={{fontSize:'12px',letterSpacing:'2px'}}>
              {events.length===0 ? 'SIN EVENTOS' : 'SELECCIONA UN EVENTO'}
            </div>
            <div style={{fontSize:'11px',color:'rgba(225,185,80,0.58)',textAlign:'center',maxWidth:'260px',lineHeight:'1.7'}}>
              {events.length===0
                ? 'Registra torneos, presentaciones y partidas con el botón "+ NUEVO EVENTO".'
                : 'Haz clic en un evento de la lista para ver su detalle.'}
            </div>
            {events.length===0 && (
              <button className="btn-gold" style={{padding:'10px 22px',fontSize:'10px',borderRadius:'2px',marginTop:'4px'}} onClick={openNew}>
                + CREAR PRIMER EVENTO
              </button>
            )}
          </div>
        ) : (()=>{
          const ti = typeInfo(event.type);
          return (
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              {/* Cabecera del detalle */}
              <div style={{padding:'14px 16px',borderBottom:'1px solid rgba(225,185,80,0.38)',background:'#141420',flexShrink:0}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
                  <div style={{width:46,height:46,borderRadius:'6px',background:ti.color+'22',border:`2px solid ${ti.color}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',flexShrink:0}}>
                    {ti.icon}
                  </div>
                  <div style={{flex:1}}>
                    <div className="orbitron" style={{fontSize:'15px',fontWeight:900,color:'#EAC858'}}>{event.name}</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'4px'}}>
                      <span className="tag" style={{borderColor:ti.color+'66',color:ti.color}}>{ti.label}</span>
                      <span className="tag">{event.format||'Modern Age'}</span>
                      {event.result && <span className="tag" style={{borderColor:'rgba(34,197,94,0.4)',color:'#86EFAC'}}>{resultLabel(event.result)}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:'5px',flexShrink:0}}>
                    <button className="btn-outline" style={{padding:'6px 10px',fontSize:'10px',borderRadius:'2px'}} onClick={()=>openEdit(event)}>✎ EDITAR</button>
                    <button className="btn-red"     style={{padding:'6px 10px',fontSize:'10px',borderRadius:'2px'}} onClick={()=>setModal('confirmDelete')}>✕</button>
                  </div>
                </div>
              </div>

              {/* Cuerpo del detalle */}
              <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:'10px'}}>

                {/* Fila de datos clave */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
                  {[
                    { icon:'📅', label:'FECHA',   val: fmtDate(event.date) },
                    { icon:'📍', label:'LUGAR',   val: event.location || '—' },
                    { icon:'🎮', label:'FORMATO', val: event.format || '—' },
                  ].map(item=>(
                    <div key={item.label} className="panel" style={{padding:'10px 12px'}}>
                      <div style={{fontSize:'9px',color:'rgba(225,185,80,0.84)',letterSpacing:'1px',marginBottom:'4px'}}>{item.icon} {item.label}</div>
                      <div style={{fontSize:'12px',color:'#EAC858',fontWeight:'bold',lineHeight:'1.3'}}>{item.val}</div>
                    </div>
                  ))}
                </div>

                {/* Equipo usado */}
                {event.teamUsed && (
                  <div className="panel" style={{padding:'12px'}}>
                    <div style={{fontSize:'9px',color:'rgba(225,185,80,0.84)',letterSpacing:'1px',marginBottom:'5px'}}>⊕ EQUIPO USADO</div>
                    <div style={{fontSize:'12px',color:'#EAC858'}}>{event.teamUsed}</div>
                  </div>
                )}

                {/* Resultado destacado */}
                {event.result && (
                  <div style={{padding:'12px 14px',background:ti.color+'11',border:`1px solid ${ti.color}44`,borderLeft:`3px solid ${ti.color}`}}>
                    <div style={{fontSize:'9px',color:'rgba(225,185,80,0.84)',letterSpacing:'1px',marginBottom:'4px'}}>RESULTADO</div>
                    <div style={{fontSize:'16px',fontWeight:'bold',color:ti.color}}>{resultLabel(event.result)}</div>
                  </div>
                )}

                {/* Notas */}
                {event.notes ? (
                  <div className="panel" style={{padding:'12px'}}>
                    <div style={{fontSize:'9px',color:'rgba(225,185,80,0.84)',letterSpacing:'1px',marginBottom:'6px'}}>📝 NOTAS</div>
                    <div style={{fontSize:'12px',color:'#ECCC6C',lineHeight:'1.75',whiteSpace:'pre-wrap'}}>{event.notes}</div>
                  </div>
                ) : (
                  <div style={{textAlign:'center',padding:'16px',color:'rgba(225,185,80,0.58)',fontSize:'10px',border:'1px dashed rgba(225,185,80,0.28)',borderRadius:'2px',cursor:'pointer'}}
                       onClick={()=>openEdit(event)}>
                    Sin notas — pulsa <strong>✎ EDITAR</strong> para añadir
                  </div>
                )}
              </div>
            </div>
          );
        })()}
      </div>

      {/* ══════════════════════════════════════════════════════
          MODAL: NUEVO / EDITAR EVENTO
      ══════════════════════════════════════════════════════ */}
      {(modal==='new'||modal==='edit') && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div className="modal fade-in" style={{maxWidth:'480px',maxHeight:'90vh',overflowY:'auto'}}>

            {/* Cabecera */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',paddingBottom:'10px',borderBottom:'1px solid rgba(225,185,80,0.38)',position:'sticky',top:0,background:'#1C1C28',zIndex:1}}>
              <div>
                <div className="orbitron" style={{fontSize:'12px',fontWeight:900,color:'#EAC858'}}>{modal==='new'?'NUEVO EVENTO':'EDITAR EVENTO'}</div>
                <div style={{fontSize:'8px',color:'rgba(225,185,80,0.84)',marginTop:'2px',letterSpacing:'1px'}}>REGISTRO DE ACTIVIDAD // KPRESE LABS</div>
              </div>
              <button onClick={closeModal} style={{background:'none',border:'none',color:'rgba(225,185,80,0.92)',fontSize:'16px',cursor:'pointer',padding:'4px'}}>✕</button>
            </div>

            {/* Nombre */}
            <div style={{marginBottom:'12px'}}>
              <label style={S.label}>NOMBRE DEL EVENTO *</label>
              <input style={{...S.field,borderColor:formErr&&!form.name.trim()?'rgba(239,68,68,0.5)':'rgba(225,185,80,0.72)'}}
                     placeholder="Ej: Torneo Estatal HeroClix Madrid 2025"
                     value={form.name} autoFocus
                     onChange={e=>{ setForm({...form,name:e.target.value}); setFormErr(''); }}/>
            </div>

            {/* Fecha + Lugar */}
            <div style={{...S.row,marginBottom:'12px'}}>
              <div style={{flex:'0 0 140px'}}>
                <label style={S.label}>FECHA *</label>
                <input type="date" style={{...S.field,borderColor:formErr&&!form.date?'rgba(239,68,68,0.5)':'rgba(225,185,80,0.72)',colorScheme:'dark'}}
                       value={form.date} onChange={e=>{ setForm({...form,date:e.target.value}); setFormErr(''); }}/>
              </div>
              <div style={{flex:1}}>
                <label style={S.label}>LUGAR</label>
                <input style={S.field} placeholder="Ciudad, local, online…"
                       value={form.location} onChange={e=>setForm({...form,location:e.target.value})}/>
              </div>
            </div>

            {/* Tipo de evento */}
            <div style={{marginBottom:'12px'}}>
              <label style={S.label}>TIPO DE EVENTO</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
                {EVENT_TYPES.map(t=>(
                  <button key={t.id} onClick={()=>setForm({...form,type:t.id})}
                          style={{padding:'7px 10px',fontSize:'10px',cursor:'pointer',fontFamily:"'Share Tech Mono',monospace",borderRadius:'2px',background:form.type===t.id?t.color+'22':'rgba(225,185,80,0.10)',border:`1px solid ${form.type===t.id?t.color:'rgba(225,185,80,0.38)'}`,color:form.type===t.id?t.color:'rgba(225,185,80,0.94)',transition:'all 0.15s'}}>
                    {t.icon} {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Formato */}
            <div style={{marginBottom:'12px'}}>
              <label style={S.label}>FORMATO DE JUEGO</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
                {EVENT_FORMATS.map(f=>(
                  <button key={f} onClick={()=>setForm({...form,format:f})}
                          style={{padding:'6px 10px',fontSize:'9px',cursor:'pointer',fontFamily:"'Share Tech Mono',monospace",borderRadius:'2px',background:form.format===f?'rgba(225,185,80,0.38)':'rgba(225,185,80,0.10)',border:`1px solid ${form.format===f?'#D4A840':'rgba(225,185,80,0.38)'}`,color:form.format===f?'#EAC858':'rgba(225,185,80,0.92)',transition:'all 0.15s'}}>
                    {f}
                  </button>
                ))}
              </div>
            </div>

            {/* Resultado */}
            <div style={{marginBottom:'12px'}}>
              <label style={S.label}>RESULTADO OBTENIDO</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'4px'}}>
                {RESULT_OPTIONS.map(r=>(
                  <button key={r.id} onClick={()=>setForm({...form,result:r.id})}
                          style={{padding:'6px 4px',fontSize:'9px',cursor:'pointer',fontFamily:"'Share Tech Mono',monospace",borderRadius:'2px',textAlign:'center',lineHeight:'1.3',background:form.result===r.id?'rgba(225,185,80,0.38)':'rgba(225,185,80,0.10)',border:`1px solid ${form.result===r.id?'#D4A840':'rgba(225,185,80,0.38)'}`,color:form.result===r.id?'#EAC858':'rgba(225,185,80,0.92)',transition:'all 0.15s'}}>
                    {r.label||'—'}
                  </button>
                ))}
              </div>
            </div>

            {/* Equipo usado */}
            <div style={{marginBottom:'12px'}}>
              <label style={S.label}>EQUIPO USADO <span style={{color:'rgba(225,185,80,0.78)',fontSize:'8px'}}>(opcional)</span></label>
              <input style={S.field} placeholder="Nombre del equipo o figuras principales"
                     value={form.teamUsed} onChange={e=>setForm({...form,teamUsed:e.target.value})}/>
            </div>

            {/* Notas */}
            <div style={{marginBottom:'14px'}}>
              <label style={S.label}>NOTAS <span style={{color:'rgba(225,185,80,0.78)',fontSize:'8px'}}>(opcional)</span></label>
              <textarea style={{...S.field,height:'80px',resize:'vertical',lineHeight:'1.6'}}
                        placeholder="Rivales, rondas, anécdotas, preparación…"
                        value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
            </div>

            {formErr && <div style={{...S.err,marginBottom:'8px'}}>⚠ {formErr}</div>}

            <div style={{display:'flex',gap:'8px'}}>
              <button className="btn-gold" style={{flex:1,padding:'10px',fontSize:'11px',borderRadius:'2px'}} onClick={saveEvent}>
                {modal==='new' ? '✓ GUARDAR EVENTO' : '✓ ACTUALIZAR EVENTO'}
              </button>
              <button className="btn-outline" style={{padding:'10px 16px',fontSize:'11px',borderRadius:'2px'}} onClick={closeModal}>
                CANCELAR
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════
          MODAL: CONFIRMAR BORRADO
      ══════════════════════════════════════════════════════ */}
      {modal==='confirmDelete' && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div className="modal fade-in" style={{maxWidth:'340px'}}>
            <div style={{textAlign:'center',padding:'8px 0 16px'}}>
              <div style={{fontSize:'32px',marginBottom:'10px'}}>⚠</div>
              <div className="orbitron" style={{fontSize:'12px',color:'#EAC858',marginBottom:'8px'}}>ELIMINAR EVENTO</div>
              <div style={{fontSize:'12px',color:'#D4AF50',lineHeight:'1.7'}}>
                ¿Eliminar <strong style={{color:'#EAC858'}}>"{event?.name}"</strong>?<br/>
                <span style={{fontSize:'10px',color:'rgba(225,185,80,0.84)'}}>Esta acción no se puede deshacer.</span>
              </div>
            </div>
            <div style={{display:'flex',gap:'8px',marginTop:'4px'}}>
              <button className="btn-red"  style={{flex:1,padding:'10px',fontSize:'11px',borderRadius:'2px'}} onClick={deleteEvent}>✕ SÍ, ELIMINAR</button>
              <button className="btn-gold" style={{flex:1,padding:'10px',fontSize:'11px',borderRadius:'2px'}} onClick={closeModal}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  AJUSTES SECTION
// ═══════════════════════════════════════════════════════════
function AjustesSection({ zoom, setZoom }) {
  const ZOOM_MIN = 0.70, ZOOM_MAX = 1.40, ZOOM_STEP = 0.05;
  const pct = Math.round(zoom * 100);
  const adj = (d) => setZoom(z => parseFloat(Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z + d)).toFixed(2)));

  const presets = [
    { label:'PEQUEÑO', val:0.80 },
    { label:'NORMAL',  val:1.00 },
    { label:'GRANDE',  val:1.20 },
    { label:'XL',      val:1.40 },
  ];

  // bar fill %
  const fill = ((zoom - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN) * 100).toFixed(1);

  return (
    <div style={{height:'100%',overflowY:'auto',padding:'24px',display:'flex',flexDirection:'column',gap:'20px',maxWidth:'560px'}}>

      {/* Header */}
      <div>
        <div className="orbitron" style={{fontSize:'18px',fontWeight:900,color:'#EAC858',marginBottom:'4px'}}>AJUSTES</div>
        <div style={{fontSize:'11px',color:'rgba(225,185,80,0.72)'}}>Configuración de la interfaz — guardada automáticamente</div>
        <div style={{height:'1px',background:'linear-gradient(90deg,#D4A840,transparent)',marginTop:'12px'}}/>
      </div>

      {/* Zoom card */}
      <div className="panel corner" style={{padding:'20px 24px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
          <div>
            <div className="orbitron" style={{fontSize:'11px',fontWeight:700,color:'#EAC858',letterSpacing:'2px'}}>TAMAÑO DE INTERFAZ</div>
            <div style={{fontSize:'10px',color:'rgba(225,185,80,0.72)',marginTop:'3px'}}>Escala todos los elementos de la app</div>
          </div>
          <div className="orbitron" style={{fontSize:'32px',fontWeight:900,color:'#D4A840',textShadow:'0 0 16px rgba(212,168,64,0.6)',lineHeight:1}}>{pct}<span style={{fontSize:'16px'}}>%</span></div>
        </div>

        {/* Slider grande */}
        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
          <button onClick={()=>adj(-ZOOM_STEP)} disabled={zoom<=ZOOM_MIN} className="btn-outline"
                  style={{flexShrink:0,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',borderRadius:'3px',padding:0,opacity:zoom<=ZOOM_MIN?0.3:1}}>−</button>
          <div style={{flex:1,position:'relative',height:'36px',display:'flex',alignItems:'center'}}>
            {/* Track visual personalizado */}
            <div style={{position:'absolute',left:0,right:0,height:'4px',background:'rgba(225,185,80,0.15)',borderRadius:'2px'}}/>
            <div style={{position:'absolute',left:0,width:`${fill}%`,height:'4px',background:'linear-gradient(90deg,#7A5820,#D4A840)',borderRadius:'2px',transition:'width 0.15s'}}/>
            <input type="range" min={ZOOM_MIN} max={ZOOM_MAX} step={ZOOM_STEP} value={zoom}
                   onChange={e=>setZoom(parseFloat(e.target.value))}
                   style={{position:'absolute',left:0,right:0,width:'100%',opacity:0,height:'36px',cursor:'pointer',margin:0,padding:0}}/>
            {/* Thumb visual */}
            <div style={{position:'absolute',left:`calc(${fill}% - 9px)`,width:'18px',height:'18px',borderRadius:'50%',background:'linear-gradient(135deg,#C9A040,#EAC858)',border:'2px solid #EAC858',boxShadow:'0 0 10px rgba(212,168,64,0.7)',pointerEvents:'none',transition:'left 0.15s'}}/>
          </div>
          <button onClick={()=>adj(ZOOM_STEP)} disabled={zoom>=ZOOM_MAX} className="btn-outline"
                  style={{flexShrink:0,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',borderRadius:'3px',padding:0,opacity:zoom>=ZOOM_MAX?0.3:1}}>+</button>
        </div>

        {/* Etiquetas min/max */}
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'9px',color:'rgba(225,185,80,0.58)',marginBottom:'16px',padding:'0 46px'}}>
          <span>70%</span><span>100%</span><span>140%</span>
        </div>

        {/* Presets */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'8px'}}>
          {presets.map(p=>{
            const active = Math.abs(zoom-p.val)<0.001;
            return (
              <button key={p.val} onClick={()=>setZoom(p.val)} className={active?'btn-gold':'btn-outline'}
                      style={{padding:'10px 4px',fontSize:'10px',borderRadius:'3px',textAlign:'center'}}>
                <div className="orbitron" style={{fontSize:'9px',letterSpacing:'1px'}}>{p.label}</div>
                <div style={{fontSize:'11px',fontWeight:'bold',marginTop:'3px'}}>{Math.round(p.val*100)}%</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Info */}
      <div style={{padding:'14px 16px',background:'rgba(225,185,80,0.06)',border:'1px solid rgba(225,185,80,0.22)',borderLeft:'3px solid #D4A840',fontSize:'11px',color:'rgba(225,185,80,0.78)',lineHeight:'1.75'}}>
        <div style={{fontWeight:'bold',color:'#EAC858',marginBottom:'4px',fontSize:'10px',letterSpacing:'1px'}}>ℹ INFORMACIÓN</div>
        El nivel de zoom se guarda automáticamente en tu navegador y se restaura en cada visita.
        Usa los presets para cambios rápidos o el slider para ajuste fino.
        El rango va de <strong style={{color:'#EAC858'}}>70%</strong> (compacto) a <strong style={{color:'#EAC858'}}>140%</strong> (accesibilidad).
      </div>

    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════
const SECTION_LABELS = {
  pac:'PODERES Y HABILIDADES (PAC)',
  teamabs:'HABILIDADES DE EQUIPO',
  builder:'EDITOR DE EQUIPOS',
  calculator:'CALCULADORA DE COMBATE',
  reglamento:'REGLAMENTO MODERNO',
  eventos:'REGISTRO DE EVENTOS',
  ajustes:'AJUSTES'
};

function App() {
  const [sec, setSec] = useState('pac');
  const [zoom, setZoom] = useState(() => {
    try { return parseFloat(localStorage.getItem('heroclix_zoom') || '1.25'); } catch { return 1.25; }
  });
  useEffect(() => {
    try { localStorage.setItem('heroclix_zoom', zoom); } catch {}
  }, [zoom]);

  return (
    <div style={{width:`calc(100vw / ${zoom})`,height:`calc(100vh / ${zoom})`,display:'flex',flexDirection:'column',background:'#080810',overflow:'hidden',zoom:zoom,transformOrigin:'top left'}}>
      <StatusBar/>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        <div style={{width:'152px',flexShrink:0}}><SideNav active={sec} onChange={setSec}/></div>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* Top bar */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 16px',background:'#141420',borderBottom:'1px solid rgba(225,185,80,0.72)',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{width:'3px',height:'16px',background:'#D4A840'}}/>
              <span className="orbitron" style={{fontSize:'10px',color:'#EAC858',letterSpacing:'1px'}}>{SECTION_LABELS[sec]}</span>
            </div>
            <div style={{display:'flex',gap:'5px'}}>
              {[0.45,0.72,1].map((o,i)=><div key={i} style={{width:'7px',height:'7px',borderRadius:'50%',background:`rgba(225,185,80,${o})`}}/>)}
            </div>
          </div>
          {/* Content */}
          <div style={{flex:1,overflow:'hidden',position:'relative'}}>
            <div className="scan-line"/>
            <div style={{position:'relative',zIndex:1,height:'100%'}}>
              {sec==='pac'        && <PACSection/>}
              {sec==='teamabs'    && <TeamAbilitiesSection/>}
              {sec==='builder'    && <TeamBuilder/>}
              {sec==='calculator' && <Calculator/>}
              {sec==='reglamento' && <ReglamentoSection/>}
              {sec==='eventos'    && <EventosSection/>}
              {sec==='ajustes'    && <AjustesSection zoom={zoom} setZoom={setZoom}/>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
